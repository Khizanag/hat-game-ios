# SwiftLint configuration — gigai personal-app conventions
# Sourced from ~/gigai/orgs/personal/swiftlint-custom-rules.yml.
# Goal: `swiftlint lint --strict` passes with zero violations.

included:
  - HatGame
  - DesignBook/Sources
  - Navigation/Sources
  - Networking/Sources

excluded:
  - "**/.build"
  - "**/DerivedData"
  - "**/Build"
  - "**/.swiftpm"
  - "**/Pods"
  - "**/Tests"
  - "**/*Tests"

# Bring in a handful of well-behaved opt-in rules that match house style.
opt_in_rules:
  - closure_spacing
  - empty_count
  - empty_string
  - explicit_init
  - first_where
  - last_where
  - redundant_nil_coalescing
  - sorted_imports
  - unneeded_parentheses_in_closure_argument
  - vertical_whitespace_closing_braces
  - vertical_whitespace_opening_braces

disabled_rules:
  # `todo` flags every TODO/FIXME — too noisy for a polish pass.
  - todo

# === Thresholds (gigai personal) ===

line_length:
  warning: 120
  error: 320
  ignores_comments: true
  ignores_urls: true
  ignores_function_declarations: false
  ignores_interpolated_strings: true

function_body_length:
  warning: 60
  error: 100

type_body_length:
  warning: 400
  error: 800

file_length:
  warning: 500
  error: 1200
  ignore_comment_only_lines: true

vertical_whitespace:
  max_empty_lines: 1

cyclomatic_complexity:
  warning: 15
  error: 25

nesting:
  type_level: 2

# gigai convention: trailing commas are required in multi-line collections.
trailing_comma:
  mandatory_comma: true

identifier_name:
  min_length: 2
  excluded:
    - id
    - x
    - y
    - to

# === Custom rules ===
# Mirrored from ~/gigai/orgs/personal/swiftlint-custom-rules.yml.

custom_rules:
  # === Code Style ===

  no_empty_line_after_mark_comment:
    name: "No Empty Line After MARK Comment"
    regex: '// MARK:[^\n]*\n\n'
    message: "No empty line allowed after MARK comment"
    severity: error

  no_empty_line_after_doc_comment:
    name: "No Empty Line After Documentation Comment"
    regex: '///[^\n]*\n\n\s*(public |private |internal |fileprivate |open |@|struct |class |enum |func |var |let |protocol |extension )'
    message: "No empty line allowed between documentation comment and declaration"
    severity: error

  # === Navigation ===

  no_navigation_link:
    name: "No NavigationLink"
    regex: 'NavigationLink\s*[\({]'
    message: "Use navigator.push() / navigator.present() instead of NavigationLink"
    severity: error

  no_navigation_destination:
    name: "No navigationDestination in Child Views"
    regex: '\.navigationDestination\(for:'
    message: "Only the navigation stack wrapper should declare navigationDestination. Use navigator.push() instead."
    severity: warning
    excluded: "CoordinatedNavigationStack\\.swift|NavigationStack\\.swift|RootNavigationStack\\.swift"

  # === Design System ===

  # Display/hero one-offs legitimately exceed the DesignBook scale (96pt scores,
  # 88pt hat emoji, etc.). Kept as warning so new feature work still gets flagged.
  no_inline_font:
    name: "No Inline Font System Size"
    regex: '\.font\(\.system\(size:'
    message: "Prefer DesignBook.Font.* tokens. Raw .font(.system(size:)) only for genuinely unique hero sizes."
    severity: warning
    excluded: "Typography\\.swift|DesignBook\\+Typography\\.swift"

  # White / black are the correct semantic choices on top of colored gradients
  # (Winner trophy, gradient discs). Warning so the rule still catches misuse.
  no_raw_foreground_white_black:
    name: "No Raw White/Black Foreground"
    regex: '\.foregroundStyle\(\.(white|black)\)'
    message: "Prefer DesignBook.Color.* tokens. Raw .white/.black only when sitting on top of a colored gradient."
    severity: warning

  no_raw_background_white_black:
    name: "No Raw White/Black Background"
    regex: '\.background\(\.(white|black)\)'
    message: "Use DesignBook.Color.* tokens instead of raw .white/.black"
    severity: error

  no_on_tap_gesture_navigation:
    name: "No onTapGesture for Navigation"
    regex: '\.onTapGesture\s*\{[^}]*navigator\.'
    message: "Use Button with navigator.push() / present() instead of onTapGesture"
    severity: error

  # === Sheets ===

  no_presentation_drag_indicator:
    name: "No presentationDragIndicator"
    regex: '\.presentationDragIndicator\('
    message: "Do not use .presentationDragIndicator — the system default is preferred"
    severity: error

  # === Package.swift ===

  no_trailing_git_in_package_url:
    name: "No Trailing .git in Package URL"
    regex: '\.package\(url:\s*"[^"]+\.git"'
    message: "Remove trailing .git from package URL — it is unnecessary"
    severity: error
    included: "Package\\.swift"

  no_up_to_next_major:
    name: "Use from: Instead of .upToNextMajor(from:)"
    regex: '\.upToNextMajor\(from:'
    message: "Use the shorthand 'from:' instead of '.upToNextMajor(from:)'"
    severity: error
    included: "Package\\.swift"

  # === Readability ===

  no_deep_nested_calls:
    name: "No Deeply Nested Calls on One Line"
    regex: '\([^()"\n]*\([^()"\n]*\([^()"\n]*$'
    message: "Break each opening ( onto its own line — do not stack 3+ unclosed nested calls on one line."
    severity: error

  # === View Structure ===

  # Kept as warning so new view files get flagged but small private nested
  # helpers (e.g. RevealedTeamCard, ShufflingOverlay) don't need to be split
  # into separate extension blocks.
  no_private_view_func_in_view:
    name: "No private view-returning func in View body"
    regex: '^    private func \w+\([^\)]*\)\s*->\s*some View'
    message: "Move private view-builder helpers into a `private extension <ViewName>` block at the bottom of the file. Inside a private extension you do not need the `private` keyword."
    severity: warning
    included: '.*/View/.*\.swift'

  no_private_view_computed_var_in_view:
    name: "No private view-returning computed var in View body"
    regex: '^    private var \w+\s*:\s*some View\s*\{'
    message: "Move private view-builder properties into a `private extension <ViewName>` block at the bottom of the file. Non-view computed properties (derived state) belong in the main body before `body`."
    severity: warning
    included: '.*/View/.*\.swift'

  # === Documentation ===

  extension_requires_mark:
    name: "Extension Requires MARK Comment"
    regex: '^\}\s*\n+\s*(?:public |private |fileprivate |internal )?extension '
    message: "Every extension should be preceded by a `// MARK: - SectionName` comment that labels what the extension provides."
    severity: error

reporter: "xcode"
